<div id="zoom-overlay" class="zoom-overlay">
    <div class="zoom-close">&times;</div>
    <div id="zoom-container" class="zoom-container">
        <img id="zoom-img" src="" alt="Zoomed view">
    </div>
</div>

<style>
    .zoom-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.98);
        z-index: 10000;
        cursor: zoom-out;
        overflow: hidden;
        touch-action: none;
    }

    .zoom-container {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.1s ease-out;
    }

    .zoom-container img {
        max-width: 90%;
        max-height: 90%;
        object-fit: contain;
        cursor: grab;
        user-select: none;
        -webkit-user-drag: none;
        transition: transform 0.2s ease-out;
    }

    .zoom-container img:active {
        cursor: grabbing;
    }

    .zoom-close {
        position: absolute;
        top: 2rem;
        right: 2rem;
        font-size: 2.5rem;
        color: var(--charcoal);
        cursor: pointer;
        z-index: 10001;
        opacity: 0.5;
        transition: opacity 0.3s;
    }

    .zoom-close:hover {
        opacity: 1;
    }

    /* Enable cursor on trigger images */
    .zoom-trigger {
        cursor: zoom-in !important;
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const overlay = document.getElementById('zoom-overlay');
        const container = document.getElementById('zoom-container');
        const zoomImg = document.getElementById('zoom-img');
        const closeBtn = document.querySelector('.zoom-close');

        let scale = 1;
        let translateX = 0;
        let translateY = 0;
        let isDragging = false;
        let startX, startY;

        // Zoom configurations
        const MIN_SCALE = 1;
        const MAX_SCALE = 5;
        const ZOOM_SPEED = 0.001;

        // Open zoom
        document.querySelectorAll('.zoom-trigger').forEach(img => {
            img.addEventListener('click', function (e) {
                zoomImg.src = this.src;
                overlay.style.display = 'block';
                resetZoom();
            });
        });

        function resetZoom() {
            scale = 1;
            translateX = 0;
            translateY = 0;
            updateTransform();
        }

        function updateTransform() {
            zoomImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        }

        // Close zoom
        function closeZoom() {
            overlay.style.display = 'none';
            zoomImg.src = '';
        }

        closeBtn.addEventListener('click', closeZoom);
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay || e.target === container) {
                closeZoom();
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && overlay.style.display === 'block') {
                closeZoom();
            }
        });

        // Mouse Wheel Zoom
        overlay.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = -e.deltaY;
            const factor = Math.exp(delta * ZOOM_SPEED);

            let newScale = scale * factor;
            newScale = Math.min(Math.max(MIN_SCALE, newScale), MAX_SCALE);

            scale = newScale;
            updateTransform();
        }, { passive: false });

        // Drag to Pan
        const startPan = (e) => {
            if (scale <= 1) return;
            isDragging = true;
            const point = e.touches ? e.touches[0] : e;
            startX = point.clientX - translateX;
            startY = point.clientY - translateY;
        };

        const movePan = (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const point = e.touches ? e.touches[0] : e;
            translateX = point.clientX - startX;
            translateY = point.clientY - startY;
            updateTransform();
        };

        const endPan = () => {
            isDragging = false;
        };

        zoomImg.addEventListener('mousedown', startPan);
        window.addEventListener('mousemove', movePan);
        window.addEventListener('mouseup', endPan);

        zoomImg.addEventListener('touchstart', startPan);
        window.addEventListener('touchmove', movePan, { passive: false });
        window.addEventListener('touchend', endPan);
    });
</script>
