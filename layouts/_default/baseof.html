<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    {{ $styles := resources.Get "css/styles.css" | minify | fingerprint }}
    <link rel="stylesheet" href="{{ $styles.RelPermalink }}" integrity="{{ $styles.Data.Integrity }}">
</head>

<body>
    {{ partial "header.html" . }}

    <main>
        {{ block "main" . }}{{ end }}
    </main>

    {{ partial "footer.html" . }}

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const wrappers = document.querySelectorAll('.sweep-wrapper');

            wrappers.forEach(wrapper => {
                const container = wrapper.querySelector('.sweep-container');
                const prevBtn = wrapper.querySelector('.nav-arrow.prev');
                const nextBtn = wrapper.querySelector('.nav-arrow.next');

                if (!container || !prevBtn || !nextBtn) return;

                const scrollAmount = () => container.clientWidth;

                nextBtn.addEventListener('click', () => {
                    container.scrollBy({ left: scrollAmount(), behavior: 'smooth' });
                });

                prevBtn.addEventListener('click', () => {
                    container.scrollBy({ left: -scrollAmount(), behavior: 'smooth' });
                });
            });
        });
    </script>
</body>

</html>
