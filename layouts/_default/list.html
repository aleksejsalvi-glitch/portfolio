{{ define "main" }}
<div class="section-container">
    <h1 style="margin-bottom: 2rem; font-size: 1.25rem; letter-spacing: 0.1em; font-weight: 400;">{{ .Title | upper }}
    </h1>
    <div class="section-description">
        {{ .Content }}
    </div>

    <div class="article-grid">
        {{ range .Pages }}
        <div class="article-card">
            {{ if .Params.image }}
            <img src='{{ .Params.image | strings.TrimPrefix "/" | relURL }}' alt="{{ .Title }}"
                style="width: 100%; height: auto; margin-bottom: 1rem;">
            {{ else }}
            <div
                style="width: 100%; height: 200px; background: #f0f0f0; margin-bottom: 1rem; display: flex; align-items: center; justify-content: center;">
                <span style="opacity: 0.5;">No Image</span>
            </div>
            {{ end }}
            <h2 style="font-size: 0.85rem; margin-bottom: 0.5rem;">{{ .Title }}</h2>
            <p style="font-size: 0.8rem; opacity: 0.7;">{{ .Date.Format "January 2, 2006" }}</p>
        </div>
        {{ end }}
    </div>
</div>
{{ end }}
