    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const wrappers = document.querySelectorAll('.sweep-wrapper');

            wrappers.forEach(wrapper => {
                const container = wrapper.querySelector('.sweep-container');
                const prevBtn = wrapper.querySelector('.nav-arrow.prev');
                const nextBtn = wrapper.querySelector('.nav-arrow.next');

                if (!container || !prevBtn || !nextBtn) return;

                const scrollAmount = () => container.clientWidth;

                nextBtn.addEventListener('click', () => {
                    container.scrollBy({ left: scrollAmount(), behavior: 'smooth' });
                });

                prevBtn.addEventListener('click', () => {
                    container.scrollBy({ left: -scrollAmount(), behavior: 'smooth' });
                });
            });
        });
    </script>
